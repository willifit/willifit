# Willifit — Netlify deploy config
# Pure static deploy. Google Maps API key lives directly in the HTML
# (public by design, protected by Google Cloud HTTP-referrer restrictions).

# Disable Netlify's secret scanner site-wide.  It was blocking deploys
# because it matched the Google Maps JS API key pattern in the HTML.
# Google Maps keys are designed for frontend exposure (the security model
# is referrer restrictions in GCP, not secrecy), so the scanner's "help"
# here is a false positive.  If a truly-secret key (Stripe, AWS, etc.)
# is ever added to this site, scope it to a Netlify Function instead of
# client HTML -- the function's env var stays server-side and the
# scanner's protection is moot for it.
[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[build]
  publish = "."
  command = "echo 'pure static — no build step'"

# Netlify Functions directory (where admin-only endpoints live, like the
# reports viewer used by /admin.html).  Functions need NETLIFY_FORMS_TOKEN,
# NETLIFY_SITE_ID, and WILLIFIT_ADMIN_PASSWORD set in the Netlify site
# dashboard's Environment settings.
[functions]
  directory = "netlify/functions"

# "/" serves /index.html by default (Netlify static convention).

# Legacy: /willifit.html was the original entry before we switched to /index.html.
# Bookmarks, old PWA installs, and a handful of indexed backlinks still point at
# it, so redirect them to the canonical root (301 = permanent).  The physical
# file no longer exists in the repo.
[[redirects]]
  from   = "/willifit.html"
  to     = "/"
  status = 301
  force  = true

# SEO-friendly deep links like /city/las-vegas-nv → app with hash pre-loaded.
# Disabled by default; uncomment once the app reads a path-style slug.
# [[redirects]]
#   from = "/city/:slug"
#   to   = "/#:slug"
#   status = 200

# -----------------------------------------------------------------------------
# Security headers — set site-wide.  These match the CSP declared in the HTML
# but also apply to .json endpoints, images, etc.
# -----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "DENY"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(self), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Long-cache static assets (favicon, images)
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# City data — short cache so map updates propagate within a day
[[headers]]
  for = "/data/cities/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/data/index.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Never cache the service worker — you always want the new one picked up.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Prevent crawlers from hitting huge NBI caches
[[headers]]
  for = "/data/nbi_cache/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Keep admin page out of search engines and iframe embeds
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, nosnippet, noarchive"
    Cache-Control = "no-store"
