# WillIFit — Netlify deploy config
# Drop-in static deploy with a tiny build step that injects the Google Maps
# API key from Netlify env vars into the HTML at deploy time.

# Tell Netlify's secrets scanner that GOOGLE_MAPS_API_KEY is intentionally
# present in the deployed HTML — Maps JS keys are designed for frontend use
# and are protected by HTTP-referrer restrictions in Google Cloud, not by
# secrecy.  Without this flag, the build fails with "Exposed secrets detected".
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_MAPS_API_KEY"

[build]
  publish = "."
  # The only build step we run is secret injection.  The __GOOGLE_MAPS_API_KEY__
  # placeholder in willifit.html / index.html gets replaced with the real key
  # from the Netlify environment variable of the same name.  This keeps the
  # real key out of git while still ending up in the served HTML (required
  # because Google Maps JS enforces HTTP-referrer restrictions in the browser,
  # not via server-side auth).  If the env var is not set, the app falls back
  # to Mapillary for street-level imagery.
  command = """
    if [ -n "$GOOGLE_MAPS_API_KEY" ]; then
      sed -i "s|__GOOGLE_MAPS_API_KEY__|$GOOGLE_MAPS_API_KEY|g" willifit.html index.html
      echo "Injected GOOGLE_MAPS_API_KEY into willifit.html + index.html"
    else
      echo "WARN: GOOGLE_MAPS_API_KEY env var not set. Street View will fall back to Mapillary."
    fi
  """

# "/" serves /index.html by default (Netlify static convention).
# /willifit.html still works as a legacy alias for shared bookmarks.

# SEO-friendly deep links like /city/las-vegas-nv → app with hash pre-loaded.
# Disabled by default; uncomment once the app reads a path-style slug.
# [[redirects]]
#   from = "/city/:slug"
#   to   = "/#:slug"
#   status = 200

# -----------------------------------------------------------------------------
# Security headers — set site-wide.  These match the CSP declared in the HTML
# but also apply to .json endpoints, images, etc.
# -----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "DENY"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(self), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Long-cache static assets (favicon, images)
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# City data — short cache so map updates propagate within a day
[[headers]]
  for = "/data/cities/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/data/index.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Never cache the service worker — you always want the new one picked up.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Prevent crawlers from hitting huge NBI caches
[[headers]]
  for = "/data/nbi_cache/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
