<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Not indexed by search engines -- this is an admin-only page. -->
<meta name="robots" content="noindex, nofollow">
<title>Willifit Admin — Pending Reports</title>
<style>
  :root {
    --bg: #0e1116; --panel: #171b23; --panel-2: #1f242e;
    --text: #e6eaf0; --muted: #8a95a6; --border: #2a3140;
    --ok: #3ecf8e; --warn: #f5a623; --bad: #e5484d;
    --accent: #f5a623;
    --mono: 'SF Mono', Menlo, Monaco, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.5;
  }
  .page { max-width: 1100px; margin: 0 auto; padding: 30px 24px 60px; }
  header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 24px; letter-spacing: -0.02em; }
  .muted { color: var(--muted); font-size: 13px; }
  .gate {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 32px; border-radius: 6px; max-width: 420px;
    margin: 100px auto 0;
  }
  .gate h2 { margin: 0 0 12px; font-size: 18px; }
  .gate input {
    width: 100%; padding: 10px 12px; margin: 12px 0;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; border-radius: 3px;
  }
  .gate input:focus { border-color: var(--accent); outline: none; }
  button {
    background: var(--accent); border: none; color: #0a0f18;
    font-weight: 700; padding: 8px 16px; border-radius: 3px;
    cursor: pointer; font-size: 13px;
  }
  button:hover { filter: brightness(1.1); }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-weight: 500;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .toolbar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .stat {
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 3px;
    font-family: var(--mono); font-size: 12px;
  }
  .report {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .report-head {
    display: flex; justify-content: space-between; gap: 12px;
    flex-wrap: wrap; margin-bottom: 8px;
  }
  .report-name { font-weight: 700; font-size: 15px; }
  .report-id { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .report-meta {
    font-size: 12px; color: var(--muted);
    margin-bottom: 12px;
  }
  .report-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 20px;
    padding: 12px; margin: 8px 0;
    background: var(--panel-2);
    border-radius: 3px;
    font-size: 13px;
  }
  .grid-label {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .grid-value { font-weight: 500; }
  .grid-value.change { color: var(--warn); }
  .grid-value.ok { color: var(--ok); }
  .report-notes {
    padding: 10px 12px;
    background: rgba(245,166,35,0.08);
    border-left: 2px solid var(--accent);
    font-size: 13px;
    border-radius: 0 3px 3px 0;
    margin: 8px 0;
    white-space: pre-wrap;
  }
  .report-actions {
    display: flex; gap: 8px; margin-top: 12px;
    flex-wrap: wrap;
  }
  .report-actions button { font-size: 11px; padding: 6px 12px; }
  .tsv-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 3px;
    font-family: var(--mono); font-size: 11px;
    margin-top: 8px;
    display: none;
    word-break: break-all;
  }
  .tsv-preview.visible { display: block; }
  .err {
    background: rgba(229,72,77,0.12);
    border: 1px solid rgba(229,72,77,0.3);
    color: var(--bad);
    padding: 12px 16px; border-radius: 3px;
    font-size: 13px; margin: 16px 0;
  }
  .empty {
    text-align: center; padding: 40px;
    color: var(--muted); font-size: 14px;
  }
  a { color: var(--ok); }
  a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="page">

<div id="gate" class="gate">
  <h2>🔒 Admin access</h2>
  <p class="muted">Enter the admin password to view pending clearance reports.</p>
  <input type="password" id="pw" placeholder="password" autocomplete="current-password">
  <button onclick="unlock()">Unlock</button>
  <p class="muted" style="font-size:11px;margin-top:20px">
    Set via <code>WILLIFIT_ADMIN_PASSWORD</code> env var in Netlify.
  </p>
</div>

<div id="dashboard" style="display:none">
  <header>
    <h1>Pending Clearance Reports</h1>
    <p class="muted">User-submitted updates awaiting your review. Nothing here has been applied to the live site yet.</p>
  </header>

  <div class="toolbar">
    <button onclick="loadReports()">Refresh</button>
    <span class="stat" id="total">—</span>
    <span class="stat" id="newToday">—</span>
    <a href="/" class="btn-ghost" style="text-decoration:none;padding:6px 12px;border-radius:3px;display:inline-block">← Back to site</a>
  </div>

  <div id="error"></div>
  <div id="reports"></div>
</div>

</div>

<script>
const PW_KEY = "willifit_admin_pw";

function unlock() {
  const pw = document.getElementById("pw").value.trim();
  if (!pw) return;
  sessionStorage.setItem(PW_KEY, pw);
  document.getElementById("gate").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  loadReports();
}

async function loadReports() {
  const pw = sessionStorage.getItem(PW_KEY);
  if (!pw) return;
  const err = document.getElementById("error");
  const target = document.getElementById("reports");
  err.innerHTML = "";
  target.innerHTML = '<div class="empty">Loading…</div>';

  let res;
  try {
    res = await fetch("/.netlify/functions/reports", {
      headers: { "x-willifit-admin": pw },
    });
  } catch (e) {
    err.innerHTML = `<div class="err">Network error: ${e}</div>`;
    target.innerHTML = "";
    return;
  }

  if (res.status === 403) {
    err.innerHTML = '<div class="err">Wrong password.</div>';
    sessionStorage.removeItem(PW_KEY);
    document.getElementById("gate").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
    target.innerHTML = "";
    return;
  }

  if (!res.ok) {
    const body = await res.text();
    err.innerHTML = `<div class="err">Error ${res.status}: ${escapeHtml(body)}</div>`;
    target.innerHTML = "";
    return;
  }

  const data = await res.json();
  const reports = data.reports || [];
  const newLocations = data.new_locations || [];
  const issues = data.issues || [];
  const all = [...reports, ...newLocations, ...issues].sort(
    (a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)
  );

  document.getElementById("total").textContent = `${all.length} total`;
  const today = new Date().toISOString().slice(0, 10);
  const newToday = all.filter((r) => (r.created_at || "").slice(0, 10) === today).length;
  document.getElementById("newToday").textContent = `${newToday} today`;

  if (!all.length) {
    target.innerHTML = '<div class="empty">No pending reports.</div>';
    return;
  }

  target.innerHTML = all.map((r) => {
    if (r.kind === "new-location-report") return renderNewLocation(r);
    if (r.kind === "location-issue-report") return renderIssue(r);
    return renderReport(r);
  }).join("");
}

function renderReport(r) {
  const when = r.created_at ? new Date(r.created_at).toLocaleString() : "unknown time";
  const cityId = r.city_slug ? `${r.city_slug}:${r.garage_id}` : r.garage_id;
  const heightLabel = inchesToLabel(r.reported_height_in);
  const prevLabel = r.previous_height_label || inchesToLabel(r.previous_height_in) || "—";
  const changed = (r.previous_height_in !== r.reported_height_in);
  const oversized = r.oversized_available || "unknown";

  // Pre-built TSV row the operator can copy into data/manual_updates.tsv
  // to apply the change via bulk_update.py.  Leaves the `url` column
  // blank because the operator should visually verify before applying.
  const tsvRow = [
    r.city_slug || "",
    r.garage_id || "",
    "", // url -- operator fills this after verifying in Street View
    heightLabel || (r.no_posted_sign ? "surface" : ""),
    r.notes ? r.notes.replace(/\s+/g, " ").slice(0, 80) : "",
  ].join("\t");

  const noteBlock = r.notes
    ? `<div class="report-notes">${escapeHtml(r.notes)}</div>`
    : "";
  const contactBlock = r.contact
    ? `<div class="muted" style="font-size:12px;margin-top:4px">Contact: <a href="mailto:${escapeHtml(r.contact)}">${escapeHtml(r.contact)}</a></div>`
    : "";

  return `
    <div class="report">
      <div class="report-head">
        <div>
          <div class="report-name">${escapeHtml(r.garage_name || "(unknown)")}</div>
          <div class="muted" style="font-size:12px">${escapeHtml(r.garage_addr || "")} ${r.city_name ? " — " + escapeHtml(r.city_name) + ", " + escapeHtml(r.city_state || "") : ""}</div>
        </div>
        <div class="report-id">
          ${escapeHtml(cityId)}<br>
          <span class="muted">${escapeHtml(when)}</span>
        </div>
      </div>

      <div class="report-grid">
        <div>
          <div class="grid-label">Stored height</div>
          <div class="grid-value">${escapeHtml(prevLabel)}</div>
        </div>
        <div>
          <div class="grid-label">Reported height</div>
          <div class="grid-value ${changed ? 'change' : 'ok'}">
            ${r.no_posted_sign ? "<i>No sign posted</i>" : (escapeHtml(heightLabel || "—"))}
          </div>
        </div>
        <div>
          <div class="grid-label">Oversized available</div>
          <div class="grid-value">${escapeHtml(oversized)}</div>
        </div>
        <div>
          <div class="grid-label">User agent</div>
          <div class="muted" style="font-size:11px">—</div>
        </div>
      </div>

      ${noteBlock}
      ${contactBlock}

      <div class="report-actions">
        <button onclick="toggleTsv('${r.id}')">Copy bulk_update row</button>
        <a class="btn-ghost" style="text-decoration:none;padding:6px 12px;border-radius:3px;display:inline-block" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((r.garage_name||"") + " " + (r.garage_addr||"") + " " + (r.city_name||"") + " " + (r.city_state||""))}">
          Verify in Google Maps ↗
        </a>
      </div>
      <div class="tsv-preview" id="tsv-${r.id}">
        <div class="muted" style="font-size:10px;margin-bottom:4px">Copy this row into data/manual_updates.tsv (fill in the URL column):</div>
        ${escapeHtml(tsvRow)}
        <br><br>
        <button onclick="copyTsv('${r.id}', ${JSON.stringify(tsvRow).replace(/"/g, '&quot;')})">Copy to clipboard</button>
      </div>
    </div>
  `;
}

// Render a user-submitted NEW location (garage/tunnel/bridge not on the
// map).  Different template than renderReport: we're creating an entry
// from scratch, not patching an existing one.
function renderNewLocation(r) {
  const when = r.created_at ? new Date(r.created_at).toLocaleString() : "unknown time";
  const heightLabel = inchesToLabel(r.reported_height_in);
  const lat = r.location_lat || "";
  const lng = r.location_lng || "";
  const coords = (lat && lng) ? `${lat}, ${lng}` : "(not provided — admin will geocode)";
  const typeLabels = {
    "garage": "Parking garage (covered)",
    "surface_lot": "Surface lot (open-air)",
    "tunnel": "Tunnel",
    "bridge": "Low bridge",
  };
  const typeLabel = typeLabels[r.location_type] || r.location_type || "?";

  const mapsQuery = encodeURIComponent(
    (r.location_name || "") + " " + (r.location_addr || "") + " " +
    (r.city_name || "") + " " + (r.city_state || "")
  );
  const mapsPin = (lat && lng)
    ? `https://www.google.com/maps/@${lat},${lng},19z`
    : `https://www.google.com/maps/search/?api=1&query=${mapsQuery}`;

  const noteBlock = r.notes
    ? `<div class="report-notes">${escapeHtml(r.notes)}</div>`
    : "";
  const contactBlock = r.contact
    ? `<div class="muted" style="font-size:12px;margin-top:4px">Contact: <a href="mailto:${escapeHtml(r.contact)}">${escapeHtml(r.contact)}</a></div>`
    : "";

  return `
    <div class="report" style="border-left: 3px solid var(--accent);">
      <div class="report-head">
        <div>
          <div class="report-name">➕ ${escapeHtml(r.location_name || "(unnamed)")}</div>
          <div class="muted" style="font-size:12px">
            <b>NEW LOCATION</b> — ${escapeHtml(typeLabel)}${r.city_name ? " · " + escapeHtml(r.city_name) + ", " + escapeHtml(r.city_state || "") : ""}
          </div>
        </div>
        <div class="report-id">
          ${escapeHtml(r.id)}<br>
          <span class="muted">${escapeHtml(when)}</span>
        </div>
      </div>

      <div class="report-grid">
        <div>
          <div class="grid-label">Address / cross-streets</div>
          <div class="grid-value">${escapeHtml(r.location_addr || "—")}</div>
        </div>
        <div>
          <div class="grid-label">Coordinates</div>
          <div class="grid-value" style="font-family:monospace;font-size:12px">${escapeHtml(coords)}</div>
        </div>
        <div>
          <div class="grid-label">Reported clearance</div>
          <div class="grid-value">
            ${r.no_posted_sign ? "<i>No sign / open-air</i>" : (escapeHtml(heightLabel || "—"))}
          </div>
        </div>
        <div>
          <div class="grid-label">Oversized-friendly?</div>
          <div class="grid-value">${escapeHtml(r.oversized || "unknown")}</div>
        </div>
      </div>

      ${noteBlock}
      ${contactBlock}

      <div class="report-actions">
        <a class="btn-ghost" style="text-decoration:none;padding:6px 12px;border-radius:3px;display:inline-block" target="_blank" rel="noopener" href="${mapsPin}">
          Verify in Google Maps ↗
        </a>
      </div>
    </div>
  `;
}

// Render a user-reported ISSUE with an existing location (closed, wrong
// pin, wrong address, duplicate, etc.).  Amber accent to distinguish
// from green=clearance-correction and blue=new-location.
function renderIssue(r) {
  const when = r.created_at ? new Date(r.created_at).toLocaleString() : "unknown time";
  const cityId = r.city_slug ? `${r.city_slug}:${r.garage_id}` : (r.garage_id || r.id);
  const issueTypeLabels = {
    "doesnt_exist": "Location doesn't exist / has closed",
    "wrong_pin": "Pin is in the wrong place",
    "wrong_address": "Address is wrong",
    "wrong_name": "Name is wrong / out of date",
    "wrong_type": "Wrong type (garage vs surface lot vs bridge)",
    "wrong_oversized": "Oversized flag is wrong",
    "duplicate": "Duplicate of another entry",
    "other": "Other issue",
  };
  const issueLabel = issueTypeLabels[r.issue_type] || r.issue_type || "(no issue type)";

  const mapsQuery = encodeURIComponent(
    (r.garage_name || "") + " " + (r.garage_addr || "") + " " +
    (r.city_name || "") + " " + (r.city_state || "")
  );

  const correctionBlock = r.correction
    ? `<div class="report-notes" style="background:rgba(245,166,35,0.08)"><b>Suggested correction:</b> ${escapeHtml(r.correction)}</div>`
    : "";
  const noteBlock = r.notes
    ? `<div class="report-notes">${escapeHtml(r.notes)}</div>`
    : "";
  const contactBlock = r.contact
    ? `<div class="muted" style="font-size:12px;margin-top:4px">Contact: <a href="mailto:${escapeHtml(r.contact)}">${escapeHtml(r.contact)}</a></div>`
    : "";

  return `
    <div class="report" style="border-left: 3px solid var(--warn);">
      <div class="report-head">
        <div>
          <div class="report-name">⚠ ${escapeHtml(r.garage_name || "(unknown)")}</div>
          <div class="muted" style="font-size:12px">
            <b>ISSUE</b> — ${escapeHtml(issueLabel)}
            ${r.city_name ? " · " + escapeHtml(r.city_name) + ", " + escapeHtml(r.city_state || "") : ""}
          </div>
        </div>
        <div class="report-id">
          ${escapeHtml(cityId)}<br>
          <span class="muted">${escapeHtml(when)}</span>
        </div>
      </div>

      ${correctionBlock}
      ${noteBlock}
      ${contactBlock}

      <div class="report-actions">
        <a class="btn-ghost" style="text-decoration:none;padding:6px 12px;border-radius:3px;display:inline-block" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${mapsQuery}">
          Verify in Google Maps ↗
        </a>
      </div>
    </div>
  `;
}

function toggleTsv(id) {
  const el = document.getElementById(`tsv-${id}`);
  el.classList.toggle("visible");
}

async function copyTsv(id, text) {
  try {
    await navigator.clipboard.writeText(text);
    const el = document.getElementById(`tsv-${id}`);
    const btn = el.querySelector("button");
    const orig = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  } catch (e) {
    alert("Couldn't copy: " + e);
  }
}

function inchesToLabel(n) {
  if (n == null) return "";
  const ft = Math.floor(n / 12);
  const rem = n % 12;
  return `${ft}'${rem}"`;
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

// Auto-unlock if password already cached this session
if (sessionStorage.getItem(PW_KEY)) {
  document.getElementById("gate").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  loadReports();
}

// Enter key in password field submits
document.getElementById("pw").addEventListener("keydown", (e) => {
  if (e.key === "Enter") unlock();
});
</script>
</body>
</html>
