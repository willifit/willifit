<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<title>Thanks — WillIFit</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root {
    --bg: #0e1116; --panel: #171b23; --text: #e6eaf0;
    --muted: #8a95a6; --border: #2a3140; --accent: #0ea5e9;
  }
  body { margin: 0; background: var(--bg); color: var(--text);
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         display: grid; place-items: center; min-height: 100vh; }
  .box { max-width: 480px; padding: 40px 32px; text-align: center; }
  h1 { font-size: 28px; margin: 0 0 12px; letter-spacing: -0.02em; }
  p { color: var(--muted); line-height: 1.6; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .check {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(14,165,233,0.15); color: var(--accent);
    display: grid; place-items: center; font-size: 32px;
    margin: 0 auto 20px;
  }
</style>
</head>
<body>
<div class="box">
  <div class="check">✓</div>
  <h1>Inquiry received</h1>
  <p>Thanks for reaching out. We'll respond within one business day with a tailored
     quote for the cities and slots you're interested in.</p>
  <p><a href="/advertise.html">← Back to advertising</a> · <a href="/">Home</a></p>
</div>
</body>
</html>
