# GitHub secret-scanning exclusions.
#
# The Google Maps API key in willifit.html / index.html is a frontend
# credential with HTTP-referrer restrictions (willifit.ai / *.willifit.ai
# / *.netlify.app), not a true secret.  This config tells GitHub's scanner
# to stop flagging these files so we don't get recurring false-positive
# alerts every time the HTML changes.
#
# If we add genuine secrets to the repo in the future (Stripe keys, AWS
# credentials, etc.), DO NOT exclude those paths — handle them properly
# via Netlify environment variables scoped to Functions (server-side).
#
# Docs: https://docs.github.com/en/code-security/secret-scanning/using-advanced-secret-scanning-and-push-protection-features/custom-patterns/excluding-folders-and-files-from-secret-scanning

paths-ignore:
  - "willifit.html"
  - "index.html"
